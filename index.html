<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>有給休暇管理 | 匡電気管理事務所</title>
<style>
:root{
  --ink:#1C2B3A;--sub:#7B8894;--paper:#F4F6F7;--card:#FFFFFF;
  --line:#DDE3E7;--shu:#C73E3A;--shu-soft:#FBEEED;
  --amber:#9A6B00;--amber-soft:#FBF3DF;--gray-soft:#EEF0F1;--radius:8px;
  --font:"Hiragino Kaku Gothic ProN","Yu Gothic","Noto Sans JP",sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--paper);color:var(--ink);font-family:var(--font);min-height:100vh;}
/* ヘッダー */
header{background:var(--ink);padding:12px 16px;}
.header-inner{max-width:720px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:12px;flex-wrap:wrap;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-img{height:34px;background:#fff;border-radius:6px;padding:3px 8px;display:block;flex-shrink:0;}
.logo-img img{height:100%;width:auto;display:block;}
.logo h1{color:#fff;font-size:15px;letter-spacing:.05em;}
.user-name{color:rgba(255,255,255,.7);font-size:13px;}
.tab-group{display:flex;border:1px solid rgba(255,255,255,.3);border-radius:6px;overflow:hidden;}
.tab-btn{padding:6px 14px;font-size:13px;background:transparent;color:rgba(255,255,255,.85);border:none;cursor:pointer;}
.tab-btn.active{background:#fff;color:var(--ink);}
.badge{display:inline-flex;align-items:center;justify-content:center;min-width:18px;height:18px;border-radius:9px;background:var(--shu);color:#fff;font-size:10px;padding:0 4px;margin-left:4px;}
/* メイン */
main{max-width:720px;margin:0 auto;padding:20px 16px;display:flex;flex-direction:column;gap:16px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:20px;}
.card-title{font-weight:700;padding-left:10px;margin-bottom:14px;}
.card-title.shu{border-left:3px solid var(--shu);}
.card-title.ink{border-left:3px solid var(--ink);}
label.lbl{display:block;font-size:12px;color:var(--sub);margin-bottom:4px;}
input[type=text],input[type=password],input[type=date],input[type=number],select{
  width:100%;border:1px solid var(--line);border-radius:6px;padding:8px 10px;
  color:var(--ink);background:#fff;font-family:var(--font);font-size:14px;
}
input:focus,select:focus{outline:2px solid var(--shu);border-color:transparent;}
.form-row{display:flex;gap:12px;flex-wrap:wrap;}
.form-row>div{flex:1;min-width:150px;}
/* ボタン */
.btn{padding:8px 20px;border-radius:6px;font-weight:700;font-size:14px;cursor:pointer;border:none;}
.btn-shu{background:var(--shu);color:#fff;}
.btn-ink{background:var(--ink);color:#fff;}
.btn-ghost{background:#fff;color:var(--sub);border:1px solid var(--line);font-weight:400;}
.btn:disabled{opacity:.5;cursor:not-allowed;}
/* 残日数 */
.stat-grid{display:flex;align-items:flex-end;justify-content:space-between;flex-wrap:wrap;gap:12px;}
.big-num{font-size:52px;font-weight:700;line-height:1;}
.big-num.warn{color:var(--shu);}
.stat-items{display:flex;gap:20px;font-size:13px;color:var(--sub);}
.stat-items strong{color:var(--ink);}
.stat-items .amber{color:var(--amber);}
/* バッジ */
.status-badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:4px;}
.s-pending{background:var(--amber-soft);color:var(--amber);}
.s-approved{background:var(--shu-soft);color:var(--shu);}
.s-rejected{background:var(--gray-soft);color:var(--sub);}
.s-cancelled{background:var(--gray-soft);color:var(--sub);}
/* 申請リスト */
.req-list .req-item{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);}
.req-list .req-item:last-child{border-bottom:none;}
.req-meta{flex:1;min-width:0;}
.req-date{font-weight:700;font-size:14px;}
.req-sub{font-size:12px;color:var(--sub);margin-top:2px;}
.req-cancel{font-size:11px;color:var(--sub);text-decoration:underline;cursor:pointer;background:none;border:none;margin-top:4px;}
/* 朱印 */
.stamp{width:60px;height:60px;border-radius:50%;border:2.5px solid var(--shu);color:var(--shu);transform:rotate(-8deg);background:rgba(255,255,255,.6);display:flex;flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;user-select:none;}
.stamp-label{font-weight:700;font-size:14px;letter-spacing:.1em;}
.stamp-date{font-size:9px;}
/* テーブル */
.tbl{width:100%;border-collapse:collapse;font-size:13px;}
.tbl th{color:var(--sub);font-weight:400;padding:6px 4px;border-bottom:1px solid var(--line);text-align:right;}
.tbl th:first-child{text-align:left;}
.tbl td{padding:8px 4px;border-bottom:1px solid var(--line);text-align:right;vertical-align:middle;}
.tbl td:first-child{text-align:left;font-weight:700;}
.tbl .warn-cell{color:var(--shu);font-weight:700;}
.tbl .amber-cell{color:var(--amber);}
/* アラート */
.alert{font-size:13px;padding:10px 14px;border-radius:6px;margin-top:8px;}
.alert-ok{background:var(--shu-soft);color:var(--shu);}
.alert-err{background:var(--gray-soft);color:var(--ink);}
/* ログイン */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.login-card{width:100%;max-width:380px;background:var(--card);border:1px solid var(--line);border-radius:var(--radius);padding:32px 28px;}
.login-logo{display:flex;flex-direction:column;align-items:center;gap:8px;margin-bottom:28px;}
.login-logo-img{width:100%;max-width:280px;height:auto;display:block;}
.link-btn{background:none;border:none;color:var(--sub);font-size:12px;cursor:pointer;text-decoration:underline;padding:0;}
.link-btn:hover{color:var(--ink);}
/* パネル */
.panel-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:200;padding:20px;}
.panel-card{background:#fff;border-radius:var(--radius);padding:28px 24px;width:100%;max-width:360px;display:flex;flex-direction:column;gap:14px;box-shadow:0 8px 32px rgba(0,0,0,.2);}
.panel-title{font-weight:700;font-size:15px;border-left:3px solid var(--shu);padding-left:10px;}
/* ローダー */
.loader{display:inline-block;width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite;vertical-align:middle;margin-right:6px;}
@keyframes spin{to{transform:rotate(360deg);}}
.divider{border:none;border-top:1px solid var(--line);margin:14px 0;}
.text-sub{font-size:12px;color:var(--sub);}
.mt2{margin-top:8px;}.mt3{margin-top:12px;}.mt4{margin-top:16px;}
.flex-between{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:8px;}
.hidden{display:none!important;}
</style>
</head>
<body>

<!-- ログイン画面 -->
<div id="page-login" class="login-wrap">
  <div class="login-card">
    <div class="login-logo">
      <img src="logo.png" alt="匡電気管理事務所" class="login-logo-img">
      <div style="font-weight:700;font-size:17px;letter-spacing:.05em;">有給休暇管理</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:14px;">
      <div><label class="lbl">アカウント名</label><input type="text" id="login-account" autocomplete="username" placeholder="アカウント名"></div>
      <div><label class="lbl">パスワード</label><input type="password" id="login-password" autocomplete="current-password" placeholder="パスワード"></div>
      <button class="btn btn-shu" id="login-btn" style="width:100%;margin-top:4px;">ログイン</button>
      <div id="login-msg"></div>
      <div style="display:flex;justify-content:space-between;margin-top:4px;">
        <button class="link-btn" onclick="showPanel('change')">パスワード変更</button>
        <button class="link-btn" onclick="showPanel('reset')">パスワード再発行</button>
      </div>
    </div>
  </div>
</div>

<!-- パスワード変更パネル -->
<div id="panel-change" class="panel-overlay hidden">
  <div class="panel-card">
    <div class="panel-title">パスワード変更</div>
    <div><label class="lbl">氏名(アカウント名)</label><input type="text" id="chg-account" placeholder="佐藤英匡"></div>
    <div><label class="lbl">現在のパスワード</label><input type="password" id="chg-old"></div>
    <div><label class="lbl">新しいパスワード(6文字以上)</label><input type="password" id="chg-new"></div>
    <div><label class="lbl">新しいパスワード(確認)</label><input type="password" id="chg-new2"></div>
    <div id="chg-msg"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="showPanel(null)">キャンセル</button>
      <button class="btn btn-shu" style="flex:1;" id="chg-btn" onclick="doChangePassword()">変更する</button>
    </div>
  </div>
</div>

<!-- パスワード再発行パネル -->
<div id="panel-reset" class="panel-overlay hidden">
  <div class="panel-card">
    <div class="panel-title">パスワード再発行</div>
    <p style="font-size:13px;color:var(--sub);">登録済みのメールアドレスに仮パスワードを送信します。</p>
    <div><label class="lbl">氏名(アカウント名)</label><input type="text" id="rst-account" placeholder="佐藤英匡"></div>
    <div id="rst-msg"></div>
    <div style="display:flex;gap:8px;">
      <button class="btn btn-ghost" style="flex:1;" onclick="showPanel(null)">キャンセル</button>
      <button class="btn btn-shu" style="flex:1;" id="rst-btn" onclick="doResetPassword()">送信する</button>
    </div>
  </div>
</div>

<!-- メイン画面 -->
<div id="page-main" class="hidden">
  <header>
    <div class="header-inner">
      <div class="logo">
        <span class="logo-img"><img src="logo.png" alt="匡電気管理事務所"></span>
        <span class="user-name" id="header-username"></span>
      </div>
      <div style="display:flex;align-items:center;gap:10px;">
        <div class="tab-group" id="tab-group"></div>
        <button class="btn btn-ghost" style="font-size:12px;padding:5px 10px;" id="logout-btn">ログアウト</button>
      </div>
    </div>
  </header>
  <main>
    <!-- マイページ -->
    <div id="view-employee" class="hidden">
      <div class="card" id="stat-card">
        <div class="stat-grid">
          <div>
            <label class="lbl">有給残日数</label>
            <div><span class="big-num" id="stat-remaining">--</span><span style="color:var(--sub);font-size:13px;"> 日</span></div>
          </div>
          <div class="stat-items">
            <div>付与 <strong id="stat-granted">--</strong> 日</div>
            <div>使用 <strong id="stat-used">--</strong> 日</div>
            <div>申請中 <strong class="amber" id="stat-pending">--</strong> 日</div>
          </div>
        </div>
      </div>
      <div class="card" id="req-form-card">
        <div class="card-title shu">有給休暇を申請する</div>
        <div class="form-row">
          <div><label class="lbl">開始日</label><input type="date" id="req-start"></div>
          <div><label class="lbl">終了日(1日なら同じ日付)</label><input type="date" id="req-end"></div>
        </div>
        <div class="mt3"><label class="lbl">事由(任意)</label><input type="text" id="req-reason" placeholder="私用のため など"></div>
        <div class="flex-between mt4">
          <span class="text-sub">申請日数: <strong id="req-days-preview">0</strong> 日 <span style="font-size:11px;">※土日を除く</span></span>
          <button class="btn btn-shu" id="req-submit-btn">申請する</button>
        </div>
        <div id="req-msg"></div>
      </div>
      <div class="card">
        <div class="card-title ink">申請履歴</div>
        <div class="req-list" id="my-req-list"><p class="text-sub">まだ申請はありません。</p></div>
      </div>
    </div>
    <!-- 管理者 -->
    <div id="view-admin" class="hidden">
      <div class="card">
        <div class="card-title shu">承認待ちの申請（<span id="admin-pending-count">0</span>件）</div>
        <div id="admin-pending-list"><p class="text-sub">承認待ちの申請はありません。</p></div>
      </div>
      <div class="card">
        <div class="card-title ink">従業員と有給残日数</div>
        <div style="overflow-x:auto;">
          <table class="tbl">
            <thead><tr><th style="text-align:left;">氏名</th><th>付与</th><th>使用</th><th>申請中</th><th>残</th></tr></thead>
            <tbody id="emp-tbody"></tbody>
          </table>
        </div>
        <p class="text-sub mt3">※従業員の追加・削除・付与日数の変更は「共通_社員マスタ」シートで行ってください。</p>
      </div>
    </div>
    <div id="main-loading" class="card" style="text-align:center;color:var(--sub);padding:30px;">
      <span class="loader" style="border-top-color:var(--sub);border-color:rgba(0,0,0,.15);border-top-color:var(--sub);"></span>読み込み中…
    </div>
  </main>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbygwdjOQItjZQ6bvtB7NG5zIbFJtc3-YzL08OGmeKldF-SDLVlqpDH5nHTAbihWyaAw/exec";

// ======================================================
//  状態
// ======================================================
var state = {account:null,isAdmin:false,employees:[],requests:[],myEmployee:null,currentView:"employee"};

// ======================================================
//  ユーティリティ
// ======================================================
function todayStr(){var t=new Date(),p=function(n){return String(n).padStart(2,"0");};return t.getFullYear()+"-"+p(t.getMonth()+1)+"-"+p(t.getDate());}
function fmtDate(s){if(!s)return "";var a=s.split("-");return a[0]+"/"+Number(a[1])+"/"+Number(a[2]);}
function countBusinessDays(s,e){
  var start=new Date(s+"T00:00:00"),end=new Date(e+"T00:00:00");
  if(isNaN(start)||isNaN(end)||start>end)return 0;
  var c=0,d=new Date(start);
  while(d<=end){var w=d.getDay();if(w!==0&&w!==6)c++;d.setDate(d.getDate()+1);}
  return c;
}
function summarize(emp,requests){
  var mine=requests.filter(function(r){return r.employeeId===emp.id;});
  var used=mine.filter(function(r){return r.status==="approved";}).reduce(function(s,r){return s+r.days;},0);
  var pending=mine.filter(function(r){return r.status==="pending";}).reduce(function(s,r){return s+r.days;},0);
  return{used:used,pending:pending,remaining:emp.granted-used};
}
function statusLabel(s){return{pending:"申請中",approved:"承認済",rejected:"却下",cancelled:"取下げ"}[s]||s;}
function statusClass(s){return{pending:"s-pending",approved:"s-approved",rejected:"s-rejected",cancelled:"s-cancelled"}[s]||"";}
function G(id){return document.getElementById(id);}
function setMsg(id,text,type){G(id).innerHTML=text?'<div class="alert alert-'+(type||"ok")+'">'+text+"</div>":"";}
async function gasCall(params){
  var url=GAS_URL+"?"+new URLSearchParams(params);
  var res=await fetch(url);
  return res.json();
}

// ======================================================
//  初期化
// ======================================================
window.addEventListener("DOMContentLoaded",function(){
  var saved=sessionStorage.getItem("yukyu-session");
  if(saved){var s=JSON.parse(saved);state.account=s.account;state.isAdmin=s.isAdmin;showMain();}
  var today=todayStr();
  G("req-start").value=today;G("req-end").value=today;
  G("login-btn").addEventListener("click",doLogin);
  G("logout-btn").addEventListener("click",doLogout);
  G("req-submit-btn").addEventListener("click",submitRequest);
  G("req-start").addEventListener("change",updateDaysPreview);
  G("req-end").addEventListener("change",updateDaysPreview);
  ["login-account","login-password"].forEach(function(id){
    G(id).addEventListener("keydown",function(e){if(e.key==="Enter")doLogin();});
  });
});

// ======================================================
//  パネル制御(パスワード変更・再発行)
// ======================================================
function showPanel(name){
  ["change","reset"].forEach(function(n){
    var p=G("panel-"+n);
    if(p)p.classList.toggle("hidden",n!==name);
  });
  if(name==="change"){
    setMsg("chg-msg","");
    ["chg-account","chg-old","chg-new","chg-new2"].forEach(function(id){var e=G(id);if(e)e.value="";});
  }
  if(name==="reset"){
    setMsg("rst-msg","");
    var a=G("rst-account");if(a)a.value="";
    var b=G("rst-btn");if(b){b.style.display="";b.disabled=false;b.textContent="送信する";}
  }
}

async function doChangePassword(){
  var account=G("chg-account").value.trim();
  var oldPw=G("chg-old").value.trim();
  var newPw=G("chg-new").value.trim();
  var newPw2=G("chg-new2").value.trim();
  if(!account||!oldPw||!newPw||!newPw2){setMsg("chg-msg","すべての項目を入力してください。","err");return;}
  if(newPw!==newPw2){setMsg("chg-msg","新しいパスワードが一致しません。","err");return;}
  if(newPw.length<6){setMsg("chg-msg","新しいパスワードは6文字以上にしてください。","err");return;}
  var btn=G("chg-btn");btn.disabled=true;btn.innerHTML='<span class="loader"></span>変更中…';
  try{
    var res=await gasCall({action:"changePassword",account:account,oldPassword:oldPw,newPassword:newPw});
    if(res.ok){setMsg("chg-msg","パスワードを変更しました。新しいパスワードでログインしてください。","ok");setTimeout(function(){showPanel(null);},2500);}
    else{setMsg("chg-msg",res.error||"変更に失敗しました。","err");}
  }catch(e){setMsg("chg-msg","通信エラーが発生しました。","err");}
  finally{btn.disabled=false;btn.textContent="変更する";}
}

async function doResetPassword(){
  var account=G("rst-account").value.trim();
  if(!account){setMsg("rst-msg","氏名を入力してください。","err");return;}
  var btn=G("rst-btn");btn.disabled=true;btn.innerHTML='<span class="loader"></span>送信中…';
  try{
    var res=await gasCall({action:"resetPassword",account:account});
    if(res.ok){setMsg("rst-msg","仮パスワードを "+res.email+" に送信しました。","ok");btn.style.display="none";}
    else{setMsg("rst-msg",res.error||"送信に失敗しました。","err");btn.disabled=false;btn.textContent="送信する";}
  }catch(e){setMsg("rst-msg","通信エラーが発生しました。","err");btn.disabled=false;btn.textContent="送信する";}
}

// ======================================================
//  ログイン / ログアウト
// ======================================================
async function doLogin(){
  var account=G("login-account").value.trim();
  var password=G("login-password").value.trim();
  if(!account||!password){setMsg("login-msg","アカウント名とパスワードを入力してください。","err");return;}
  var btn=G("login-btn");btn.disabled=true;btn.innerHTML='<span class="loader"></span>認証中…';
  setMsg("login-msg","");
  try{
    var data=await gasCall({action:"login",account:account,password:password});
    if(data.ok){
      state.account=data.account;state.isAdmin=data.isAdmin;
      sessionStorage.setItem("yukyu-session",JSON.stringify({account:data.account,isAdmin:data.isAdmin}));
      showMain();
    }else{setMsg("login-msg",data.error||"ログインに失敗しました。","err");}
  }catch(e){setMsg("login-msg","通信エラーが発生しました。","err");}
  finally{btn.disabled=false;btn.textContent="ログイン";}
}

function doLogout(){
  sessionStorage.removeItem("yukyu-session");
  state={account:null,isAdmin:false,employees:[],requests:[],myEmployee:null,currentView:"employee"};
  G("page-login").classList.remove("hidden");
  G("page-main").classList.add("hidden");
  G("login-account").value="";G("login-password").value="";
  setMsg("login-msg","");
}

// ======================================================
//  メイン画面
// ======================================================
function showMain(){
  G("page-login").classList.add("hidden");
  G("page-main").classList.remove("hidden");
  G("header-username").textContent=state.account+" さん";
  buildTabs();loadData();
}

function buildTabs(){
  var tg=G("tab-group");tg.innerHTML="";
  var tabs=[["employee","マイページ"]];
  if(state.isAdmin)tabs.push(["admin","管理者"]);
  tabs.forEach(function(t){
    var btn=document.createElement("button");
    btn.className="tab-btn"+(state.currentView===t[0]?" active":"");
    btn.dataset.view=t[0];btn.textContent=t[1];
    if(t[0]==="admin")btn.id="admin-tab-btn";
    btn.addEventListener("click",function(){switchView(t[0]);});
    tg.appendChild(btn);
  });
}

function switchView(view){
  state.currentView=view;
  document.querySelectorAll(".tab-btn").forEach(function(b){b.classList.toggle("active",b.dataset.view===view);});
  G("view-employee").classList.toggle("hidden",view!=="employee");
  G("view-admin").classList.toggle("hidden",view!=="admin");
}

// ======================================================
//  データ読み込み
// ======================================================
async function loadData(){
  G("main-loading").classList.remove("hidden");
  G("view-employee").classList.add("hidden");
  G("view-admin").classList.add("hidden");
  try{
    var results=await Promise.all([gasCall({action:"getEmployees"}),gasCall({action:"getRequests"})]);
    state.employees=results[0].employees||[];
    state.requests=results[1].requests||[];
    state.myEmployee=state.employees.find(function(e){return e.name===state.account;})||null;
    render();
  }catch(e){alert("データの読み込みに失敗しました。");}
  finally{G("main-loading").classList.add("hidden");}
}

// ======================================================
//  描画
// ======================================================
function render(){
  renderEmployee();
  if(state.isAdmin)renderAdmin();
  switchView(state.currentView);
  updateAdminBadge();
}

function renderEmployee(){
  var emp=state.myEmployee;
  if(!emp){
    G("stat-card").innerHTML='<p style="color:var(--sub);font-size:14px;">アカウント名「<strong>'+state.account+'</strong>」と一致する従業員が名簿にありません。<br>管理者に従業員名の登録を依頼してください。</p>';
    G("req-form-card").classList.add("hidden");return;
  }
  G("req-form-card").classList.remove("hidden");
  var s=summarize(emp,state.requests);
  G("stat-remaining").textContent=s.remaining;
  G("stat-remaining").className="big-num"+(s.remaining<=3?" warn":"");
  G("stat-granted").textContent=emp.granted;
  G("stat-used").textContent=s.used;
  G("stat-pending").textContent=s.pending;
  var myReqs=state.requests.filter(function(r){return r.employeeId===emp.id;});
  var list=G("my-req-list");
  if(myReqs.length===0){list.innerHTML='<p class="text-sub">まだ申請はありません。</p>';return;}
  list.innerHTML=myReqs.map(function(r){
    return '<div class="req-item"><div class="req-meta"><div class="req-date">'+
      fmtDate(r.startDate)+(r.startDate!==r.endDate?" 〜 "+fmtDate(r.endDate):"")+
      '<span style="font-weight:400;font-size:13px;color:var(--sub);margin-left:6px;">'+r.days+'日</span>'+
      '<span class="status-badge '+statusClass(r.status)+'" style="margin-left:4px;">'+statusLabel(r.status)+'</span></div>'+
      (r.reason?'<div class="req-sub">'+r.reason+'</div>':'')+
      (r.status==="pending"?'<button class="req-cancel" onclick="cancelRequest(\''+r.id+'\')">申請を取り下げる</button>':'')+
      '</div>'+(r.status==="approved"?'<div class="stamp"><div class="stamp-label">承認</div><div class="stamp-date">'+fmtDate(r.decidedAt)+'</div></div>':'')+
      '</div>';
  }).join("");
}

function updateDaysPreview(){
  G("req-days-preview").textContent=countBusinessDays(G("req-start").value,G("req-end").value);
}

function renderAdmin(){
  var pending=state.requests.filter(function(r){return r.status==="pending";});
  G("admin-pending-count").textContent=pending.length;
  var plist=G("admin-pending-list");
  if(pending.length===0){plist.innerHTML='<p class="text-sub">承認待ちの申請はありません。</p>';}
  else{
    plist.innerHTML=pending.map(function(r){
      var emp=state.employees.find(function(e){return e.id===r.employeeId;});
      return '<div style="display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);flex-wrap:wrap;">'+
        '<div style="flex:1;min-width:180px;"><div style="font-weight:700;">'+(emp?emp.name:"(削除済)")+'</div>'+
        '<div class="text-sub" style="margin-top:2px;">'+fmtDate(r.startDate)+(r.startDate!==r.endDate?" 〜 "+fmtDate(r.endDate):"")+
        "・"+r.days+"日"+(r.reason?"・"+r.reason:"")+'</div></div>'+
        '<div style="display:flex;gap:8px;">'+
        '<button class="btn btn-shu" style="font-size:13px;padding:6px 16px;" onclick="decide(\''+r.id+'\',\'approved\')">承認</button>'+
        '<button class="btn btn-ghost" style="font-size:13px;padding:6px 16px;" onclick="decide(\''+r.id+'\',\'rejected\')">却下</button>'+
        '</div></div>';
    }).join("");
  }
  var tbody=G("emp-tbody");
  tbody.innerHTML=state.employees.map(function(e){
    var s=summarize(e,state.requests);
    return '<tr><td>'+e.name+(e.name===state.account?'<span style="font-size:11px;color:var(--sub);margin-left:4px;">(あなた)</span>':"")+
      '</td><td>'+e.granted+'</td><td>'+s.used+'</td>'+
      '<td class="'+(s.pending>0?"amber-cell":"")+'">'+s.pending+'</td>'+
      '<td class="'+(s.remaining<=3?"warn-cell":"")+'">'+s.remaining+'</td></tr>';
  }).join("");
}

function updateAdminBadge(){
  var btn=G("admin-tab-btn");if(!btn)return;
  var count=state.requests.filter(function(r){return r.status==="pending";}).length;
  var ex=btn.querySelector(".badge");if(ex)ex.remove();
  if(count>0)btn.insertAdjacentHTML("beforeend",'<span class="badge">'+count+'</span>');
}

// ======================================================
//  操作
// ======================================================
async function submitRequest(){
  var emp=state.myEmployee;if(!emp)return;
  var startDate=G("req-start").value,endDate=G("req-end").value;
  var reason=G("req-reason").value.trim();
  var days=countBusinessDays(startDate,endDate);
  if(days<=0){setMsg("req-msg","日付を確認してください。","err");return;}
  var s=summarize(emp,state.requests);
  if(days>s.remaining-s.pending){setMsg("req-msg","残日数が不足しています(申請可能:"+( s.remaining-s.pending)+"日)。","err");return;}
  var btn=G("req-submit-btn");btn.disabled=true;btn.innerHTML='<span class="loader"></span>送信中…';
  setMsg("req-msg","");
  try{
    var res=await gasCall({action:"addRequest",employeeId:emp.id,startDate:startDate,endDate:endDate,days:days,reason:reason,status:"pending",createdAt:todayStr()});
    if(res.ok){G("req-reason").value="";setMsg("req-msg","申請しました("+days+"日)。承認をお待ちください。","ok");await loadData();}
    else{setMsg("req-msg",res.error||"申請に失敗しました。","err");}
  }catch(e){setMsg("req-msg","通信エラーが発生しました。","err");}
  finally{btn.disabled=false;btn.textContent="申請する";}
}

async function cancelRequest(id){
  if(!confirm("この申請を取り下げますか？"))return;
  try{await gasCall({action:"updateRequest",id:id,status:"cancelled",decidedAt:""});await loadData();}
  catch(e){alert("通信エラー");}
}

async function decide(id,status){
  try{await gasCall({action:"updateRequest",id:id,status:status,decidedAt:todayStr()});await loadData();}
  catch(e){alert("通信エラー");}
}
</script>
